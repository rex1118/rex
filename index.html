<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>렉스</title>
  <link rel="icon" type="image/jpeg" href="https://profile.img.sooplive.co.kr/LOGO/fo/fonetree/fonetree.jpg">
  <meta name="description" content="우당탕탕 공룡 렉스 공식 페이지">
  <meta property="og:type" content="website">
  <meta property="og:title" content="렉스">
  <meta property="og:description" content="우당탕탕 공룡 렉스 공식 페이지">
  <meta property="og:image" content="https://profile.img.sooplive.co.kr/LOGO/fo/fonetree/fonetree.jpg">
  <meta property="og:image:width" content="600"><meta property="og:image:height" content="600">
  <meta name="twitter:card" content="summary_large_image">
  <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#13161A; --bg2:#0E1115; --card:#1C222A; --main:#65D57D; --soft:#9FE8B0; --line:rgba(101,213,125,.16);
      --text:#E8EDE9; --tsoft:#9AA69D; --pink:#F0A6B3; --page:760px;
      --banner-h:220px; --hand:'Nanum Pen Script',cursive; --pen:'Noto Sans KR',sans-serif;
    }
    body.dim{ --bg:#1A2027; --bg2:#151B22; --card:#242C35; --text:#F2F7F3; --tsoft:#A7B3AA; }
    *{ margin:0; padding:0; box-sizing:border-box; }
    body{ background:var(--bg); color:var(--text); font-family:var(--pen); font-size:16px; min-height:100vh; padding:0 20px 80px; overflow-x:hidden; transition:background .2s; }
    /* nav */
    .nav{ max-width:var(--page); margin:20px auto 0; display:flex; align-items:center; border-bottom:1px solid var(--line); }
    .nav a.nav-logo{ font-family:var(--hand); font-size:36px !important; color:var(--main) !important; margin-right:auto; padding:8px 4px; text-decoration:none; line-height:1; white-space:nowrap; }
    .nav a{ font-size:15px; color:var(--tsoft); text-decoration:none; padding:18px 13px; transition:.15s; white-space:nowrap; }
    .nav a:hover, .nav a.active{ color:var(--soft); }
    .tsw{ margin-left:10px; width:38px; height:21px; border-radius:999px; border:1px solid var(--line); background:transparent; position:relative; cursor:pointer; flex-shrink:0; }
    .tsw .k{ position:absolute; top:1.5px; left:2px; width:16px; height:16px; border-radius:50%; background:var(--main); transition:left .2s; font-size:9px; text-align:center; line-height:16px; }
    body.dim .tsw .k{ left:18px; }
    @media(max-width:560px){ .nav a.nav-logo{ font-size:30px !important; } .nav a{ padding:16px 9px; font-size:14px; } }
    /* profile + banner */
    .profile{ max-width:var(--page); margin:22px auto 0; }
    .band{ height:var(--banner-h); border-radius:24px; position:relative; overflow:hidden; box-shadow:0 12px 38px rgba(0,0,0,.32); background:linear-gradient(120deg,#1d3a2a 0%, #143029 45%, #122a31 100%); }
    .band .bgimg{ position:absolute; inset:0; background-size:cover; background-position:center; background-repeat:no-repeat; }
    .band .bgimg.blur{ filter:blur(30px) brightness(.62); transform:scale(1.35); }
    .band .grad{ position:absolute; inset:0; background:linear-gradient(180deg, rgba(13,22,18,.2) 0%, rgba(13,20,24,.7) 100%); }
    .band .grad.soft{ background:linear-gradient(180deg, rgba(0,0,0,0) 58%, rgba(13,20,24,.5) 100%); }
    .band .iq{ position:absolute; top:16px; right:16px; z-index:3; background:rgba(0,0,0,.32); border:1px solid rgba(255,255,255,.28); color:#fff; font-size:15px; font-weight:700; padding:9px 16px; border-radius:999px; cursor:pointer; backdrop-filter:blur(6px); }
    .band .iq:hover{ background:var(--main); color:#0e1a12; border-color:var(--main); }
    .head{ display:flex; align-items:flex-end; justify-content:space-between; gap:14px; padding:0 10px; margin-top:-66px; position:relative; z-index:2; flex-wrap:wrap; }
    .avatar{ width:140px; height:140px; border-radius:50%; overflow:hidden; background:#1a2027; border:5px solid var(--bg); box-shadow:0 8px 28px rgba(0,0,0,.5); display:flex; align-items:center; justify-content:center; font-size:56px; flex-shrink:0; cursor:pointer; }
    .avatar img{ width:100%; height:100%; object-fit:cover; }
    .hbtns{ display:flex; gap:9px; padding-bottom:10px; flex-wrap:wrap; }
    .btn{ display:inline-flex; align-items:center; gap:8px; padding:12px 20px; border-radius:999px; font-size:15px; font-weight:700; text-decoration:none; transition:.2s; cursor:pointer; border:none; font-family:inherit; }
    .btn.fill{ background:var(--main); color:#0e1a12; } .btn.fill:hover{ filter:brightness(1.06); transform:translateY(-2px); }
    .btn.line{ background:transparent; border:1.5px solid var(--line); color:var(--soft); } .btn.line:hover{ background:rgba(101,213,125,.1); }
    @media(max-width:560px){ .band{ border-radius:18px; } }
    .pbody{ padding:16px 12px 0; }
    .pname{ font-family:var(--hand); font-size:74px; line-height:.9; color:#EEF6EF; }
    .peb{ font-size:15px; color:var(--main); font-weight:700; margin-top:2px; }
    .pbio{ font-size:17px; color:var(--text); margin-top:12px; line-height:1.7; }
    .meta{ display:flex; gap:9px; flex-wrap:wrap; margin-top:14px; }
    .chip{ background:rgba(101,213,125,.12); color:var(--soft); border:1.5px solid var(--line); border-radius:999px; padding:9px 16px; font-size:15px; font-weight:600; }
    .chip b{ color:var(--main); } .chip.day{ background:rgba(101,213,125,.2); }
    .card{ background:var(--card); border:1.5px solid var(--line); border-radius:22px; padding:26px; margin-top:16px; }
    .card:first-of-type{ margin-top:22px; }
    .card h2{ font-size:20px; color:var(--soft); display:flex; align-items:center; gap:9px; margin-bottom:14px; font-weight:800; }
    .card h2 .ic{ font-size:23px; }
    .card p{ font-size:16px; line-height:1.9; color:var(--text); } .card p b{ color:var(--soft); }
    .chips{ display:flex; gap:9px; flex-wrap:wrap; } .chips.mt{ margin-top:15px; }
    .gchip{ background:rgba(101,213,125,.12); color:var(--soft); border:1.5px solid var(--line); border-radius:999px; padding:9px 16px; font-size:15px; font-weight:600; }
    .gchip.neg{ background:rgba(240,166,179,.1); color:var(--pink); border-color:rgba(240,166,179,.25); }
    .rows .r{ display:flex; gap:14px; padding:11px 0; border-bottom:1px dashed var(--line); } .rows .r:last-child{ border:none; }
    .r .k{ width:76px; flex-shrink:0; color:var(--soft); font-weight:700; font-size:15px; } .r .v{ color:var(--text); font-size:16px; }
    .ld{ display:grid; grid-template-columns:1fr 1fr; gap:18px; } @media(max-width:520px){ .ld{ grid-template-columns:1fr; gap:16px; } }
    .ld .lab{ font-size:15px; font-weight:800; margin-bottom:12px; } .ld .like .lab{ color:var(--soft); } .ld .dis .lab{ color:var(--pink); }
    .crewbadge{ display:inline-flex; gap:7px; align-items:center; background:rgba(101,213,125,.13); color:var(--soft); font-weight:800; font-size:15px; padding:8px 17px; border-radius:999px; margin-bottom:14px; }
    .crewrow{ display:flex; gap:10px; flex-wrap:wrap; margin-top:16px; }
    footer{ max-width:var(--page); margin:30px auto 0; text-align:center; color:var(--tsoft); font-size:14px; line-height:1.9; }
    @media(max-width:560px){ .pname{ font-size:62px; } body{ padding:0 16px 70px; } }
    /* modal */
    .ov{ position:fixed; inset:0; background:rgba(8,11,14,.66); display:none; align-items:center; justify-content:center; z-index:600; padding:16px; }
    .ov.show{ display:flex; }
    .mod{ background:var(--card); border:1.5px solid var(--line); border-radius:22px; width:100%; max-width:420px; padding:26px; box-shadow:0 22px 60px rgba(0,0,0,.5); }
    .mod h3{ font-size:19px; color:var(--soft); margin-bottom:5px; font-weight:800; }
    .mod p{ font-size:14px; color:var(--tsoft); margin-bottom:17px; }
    .mod input,.mod textarea{ width:100%; padding:13px 15px; border-radius:13px; border:1.5px solid var(--line); background:var(--bg2); color:var(--text); font-family:inherit; font-size:15px; margin-bottom:10px; outline:none; }
    .mod input:focus,.mod textarea:focus{ border-color:var(--main); }
    .mod .b{ display:flex; gap:9px; margin-top:5px; }
    .mod .b button{ flex:1; padding:13px; border-radius:13px; border:none; font-weight:800; font-size:15px; cursor:pointer; }
    .mod .send{ background:var(--main); color:#0e1a12; } .mod .can{ background:rgba(101,213,125,.1); color:var(--soft); }
  </style>
</head>
<body>
<nav class="nav">
  <a href="index.html" class="nav-logo">렉스</a>
  <a href="index.html" class="active">프로필</a>
  <a href="notice/">공지</a>
  <a href="schedule/">일정</a>
  <a href="work/">업보</a>
  <a href="dress/">옷장</a>
  <button class="tsw" id="themeSwitch" type="button" aria-label="다크모드"><span class="k" id="themeKnob">🌙</span></button>
</nav>
<div class="profile">
  <div class="band">
    <div class="bgimg" id="bannerImg"></div>
    <div class="grad" id="bannerGrad"></div>
    <button class="iq" onclick="openInquiry()">✉️ 문의</button>
  </div>
  <div class="head">
    <div class="avatar" id="avatarWrap">
      <img id="avatarImg" src="" alt="렉스" style="display:none" onerror="this.style.display='none'; var e=document.getElementById('avatarEmoji'); if(e) e.style.display='flex'">
      <span id="avatarEmoji">🦖</span>
    </div>
    <div class="hbtns">
      <a class="btn fill" id="btn-soop" href="https://www.sooplive.com/station/fonetree" target="_blank" rel="noopener">📺 SOOP 방송국</a>
      <a class="btn line" id="btn-discord" href="https://discord.gg/Ug9bsttu" target="_blank" rel="noopener">💬 디스코드</a>
    </div>
  </div>
  <div class="pbody">
    <h1 class="pname" id="info-name">렉스</h1>
    <div class="peb" id="info-eyebrow">🦖 공룡 버튜버 · 개인세</div>
    <p class="pbio" id="info-catchphrase">우당탕탕 공룡 렉스!</p>
    <div class="meta">
      <span class="chip" id="info-gender">여</span>
      <span class="chip" id="info-dates"></span>
      <span class="chip">팬닉 <b id="info-fandom"></b></span>
      <span class="chip day" id="dday-chip" style="display:none"><span id="dday"></span></span>
    </div>
  </div>

  <div class="card">
    <h2><span class="ic">🦕</span>렉스는 어떤 공룡?</h2>
    <p id="info-about"></p>
    <div class="chips mt" id="info-tags"></div>
  </div>

  <div class="card">
    <h2><span class="ic">📅</span>방송</h2>
    <div class="rows">
      <div class="r"><span class="k">방송</span><span class="v" id="info-schedule"></span></div>
      <div class="r"><span class="k">콘텐츠</span><span class="v" id="info-content"></span></div>
      <div class="r"><span class="k">게임</span><span class="v" id="info-games"></span></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="ic">💚</span>좋아요 &amp; 싫어요</h2>
    <div class="ld">
      <div class="like"><div class="lab">좋아하는 거</div>
        <div class="chips">
          <span class="gchip" id="like1"></span><span class="gchip" id="like2"></span><span class="gchip" id="like3"></span><span class="gchip" id="like4"></span>
        </div>
      </div>
      <div class="dis"><div class="lab">싫어하는 거</div>
        <div class="chips">
          <span class="gchip neg" id="dislike1"></span><span class="gchip neg" id="dislike2"></span>
        </div>
      </div>
    </div>
  </div>

  <div class="card">
    <h2><span class="ic">🎤</span>노래</h2>
    <p id="info-song"></p>
    <div class="rows">
      <div class="r"><span class="k">장르</span><span class="v" id="info-genre"></span></div>
      <div class="r"><span class="k">시그니처</span><span class="v" id="info-signature"></span></div>
    </div>
  </div>

  <div class="card">
    <h2><span class="ic">📡</span>소속 크루</h2>
    <span class="crewbadge" id="info-crew-badge">📡 주파수 크루 소속</span>
    <p id="info-crew-desc"></p>
    <div class="crewrow">
      <a class="btn fill" id="btn-cafe" href="https://cafe.naver.com/zoopasu" target="_blank" rel="noopener">☕ 주파수 카페</a>
    </div>
  </div>
</div>

<footer>Copyright © 2026 렉스 Official.<br>비지니스 문의 — Discord DM</footer>

<div class="ov" id="iq-ov" onclick="if(event.target===this)closeInquiry()">
  <div class="mod">
    <h3>✉️ 문의하기</h3><p>렉스에게 하고 싶은 말을 남겨주세요 🦖</p>
    <input id="iq-nick" placeholder="닉네임 (필수)"><textarea id="iq-msg" rows="4" placeholder="문의 내용을 적어주세요"></textarea>
    <div class="b"><button class="can" onclick="closeInquiry()">취소</button><button class="send" onclick="sendInquiry()">보내기 💚</button></div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="supabase.js"></script>
<script>
  // DB(profile id=1)가 비어도 아래 기본값으로 보임. 관리자에서 바꾸면 그 값이 우선.
  const defaults = {
    'soop-id':'fonetree', avatar:'', banner:'',   // avatar/banner: 직접 이미지(.jpg/.png/.gif) URL 넣으면 우선
    'info-name':'렉스', 'info-eyebrow':'🦖 공룡 버튜버 · 개인세', 'info-catchphrase':'우당탕탕 공룡 렉스!',
    'info-gender':'여', 'info-dates':'데뷔 2025.06.16 · 생일 11.18', 'info-fandom':'고고', birthday:'11-18',
    'info-about':'눈나미처럼 든든하다가도 가끔 잼민이가 톡 튀어나오는, 씩씩한 공룡이에요. 외모 포인트는 공룡 눈과 송곳니! 주로 저챗과 종합게임으로 만나요.',
    'info-tags':'눈나미, 씩씩함, 잼민력 충전',
    'info-schedule':'주 5일 · 저녁 8시 · 휴방 2일(랜덤)', 'info-content':'저챗 · 종합게임', 'info-games':'스팀 종합게임 · FPS',
    'info-song':'가끔 불러요. 음치라며 부끄러워하지만 분위기는 확실히 챙기는 타입!', 'info-genre':'발라드', 'info-signature':'♪ 에일리 — 손대지마',
    'info-crew':'주파수', 'info-crew-desc':'렉스는 주파수 크루 소속이에요. 크루 카페에 놀러오세요!',
    'info-cafe':'https://cafe.naver.com/zoopasu', 'info-discord':'https://discord.gg/Ug9bsttu', 'info-channel':'https://www.sooplive.com/station/fonetree',
    like1:'고고 (오리 팬♡)', like2:'먹는 거', like3:'자는 거', like4:'게임',
    dislike1:'벌레 · 귀신', dislike2:'토마토 · 오이',
  };
  function soopAvatar(id){ if(!id) return null; id=id.trim().toLowerCase(); if(id.length<2) return null; return `https://profile.img.sooplive.co.kr/LOGO/${id.slice(0,2)}/${id}/${id}.jpg`; }

  async function load(){
    let saved={};
    try{ const {data}=await db.from('profile').select('data').eq('id',1); if(data&&data[0]&&data[0].data) saved=data[0].data; }catch(e){ console.log('profile load', e); }
    const d={ ...defaults, ...saved };
    const avatarUrl = d.avatar || soopAvatar(d['soop-id']);

    // 프사
    const img=document.getElementById('avatarImg'), em=document.getElementById('avatarEmoji');
    if(avatarUrl && img){ img.src=avatarUrl; img.style.display='block'; if(em) em.style.display='none'; }

    // 배너: 직접 배너 URL이 있으면 그걸(중앙), 없으면 SOOP 프사를 흐리게 깔아 연동
    const bg=document.getElementById('bannerImg'), grad=document.getElementById('bannerGrad');
    if(bg){
      if(d.banner){ bg.style.backgroundImage=`url("${d.banner}")`; bg.classList.remove('blur'); if(grad) grad.classList.add('soft'); }
      else if(avatarUrl){ bg.style.backgroundImage=`url("${avatarUrl}")`; bg.classList.add('blur'); if(grad) grad.classList.remove('soft'); }
    }

    const set=(id,v)=>{ const el=document.getElementById(id); if(el) el.textContent=(v==null?'':v); };
    const href=(id,v)=>{ const el=document.getElementById(id); if(el){ if(v){ el.href=v; el.style.display=''; } else { el.style.display='none'; } } };

    // 기본 정보
    set('info-name', d['info-name']); set('info-eyebrow', d['info-eyebrow']); set('info-catchphrase', d['info-catchphrase']);
    set('info-gender', d['info-gender']); set('info-dates', d['info-dates']); set('info-fandom', d['info-fandom']);
    // 소개 / 방송 / 노래
    set('info-about', d['info-about']);
    set('info-schedule', d['info-schedule']); set('info-content', d['info-content']); set('info-games', d['info-games']);
    set('info-song', d['info-song']); set('info-genre', d['info-genre']); set('info-signature', d['info-signature']);
    // 크루 + 버튼
    const crew=(d['info-crew']||'').trim();
    set('info-crew-badge', crew ? `📡 ${crew} 크루 소속` : '');
    set('info-crew-desc', d['info-crew-desc']);
    const cafeBtn=document.getElementById('btn-cafe'); if(cafeBtn) cafeBtn.textContent=`☕ ${crew||''} 카페`.replace('  ',' ');
    href('btn-cafe', d['info-cafe']); href('btn-discord', d['info-discord']); href('btn-soop', d['info-channel']);

    // 태그 / 좋아요 / 싫어요
    const tagsEl=document.getElementById('info-tags');
    if(tagsEl) tagsEl.innerHTML=(d['info-tags']||'').split(',').filter(t=>t.trim()).map(t=>`<span class="gchip">${t.trim()}</span>`).join('');
    ['like1','like2','like3','like4','dislike1','dislike2'].forEach(id=>{ const el=document.getElementById(id); if(el){ const v=(d[id]||'').trim(); el.textContent=v; el.style.display=v?'':'none'; } });

    // 생일 D-Day
    (function(){ var mmdd=(d.birthday||'11-18').replace(/\./g,'-'); var t=mmdd.split('-'); var m=+t[t.length-2], dd=+t[t.length-1]; if(!m||!dd) return; var n=new Date(); n.setHours(0,0,0,0); var y=n.getFullYear(); var nx=new Date(y,m-1,dd); if(nx<n) nx=new Date(y+1,m-1,dd); var v=Math.round((nx-n)/864e5); var c=document.getElementById('dday-chip'), x=document.getElementById('dday'); if(x) x.textContent=(v===0?'🎉 오늘 생일!':'🎂 생일 D-'+v); if(c) c.style.display=''; })();
  }
  load();

  // 문의
  function openInquiry(){ document.getElementById('iq-ov').classList.add('show'); }
  function closeInquiry(){ document.getElementById('iq-ov').classList.remove('show'); }
  async function sendInquiry(){
    const nick=document.getElementById('iq-nick').value.trim(); if(!nick){ alert('닉네임을 적어주세요'); return; }
    const msg=document.getElementById('iq-msg').value.trim(); if(!msg){ alert('문의 내용을 적어주세요'); return; }
    const ok=await insertRow('inquiries',{ nickname:nick, message:msg });
    if(ok){ alert('문의가 전송됐어요! 🦖'); document.getElementById('iq-nick').value=''; document.getElementById('iq-msg').value=''; closeInquiry(); }
    else { alert('전송 실패 ㅠㅠ 잠시 후 다시 시도해주세요'); }
  }

  // SOOP iframe 높이 자동
  if(window.parent!==window && typeof initIframeResize==='function'){ window.addEventListener('load', initIframeResize); setTimeout(initIframeResize, 800); }

  // 다크모드 토글 (기본 깊은 다크 ↔ 살짝 밝은 다크 = 배경 항상 어둡게)
  (function(){
    var sw=document.getElementById('themeSwitch'), k=document.getElementById('themeKnob');
    if(localStorage.getItem('rexdim')==='1') document.body.classList.add('dim');
    function r(){ if(k) k.textContent=document.body.classList.contains('dim')?'☀️':'🌙'; }
    if(sw) sw.onclick=function(){ document.body.classList.toggle('dim'); localStorage.setItem('rexdim', document.body.classList.contains('dim')?'1':'0'); r(); };
    r();
  })();
</script>
<script src="fx.js"></script>
</body>
</html>
